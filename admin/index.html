<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Josh's Admin Panel</title>
  <meta name="google" content="notranslate" />
  <script>
    // 【暴力第 1 步】在所有脚本加载前，强行在本地存储里打桩
    // 这样 Identity 脚本一醒过来，就会以为自己就该去 netlify.app
    localStorage.setItem('netlifySiteURL', 'https://inspiring-cat-299a60.netlify.app');
  </script>
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // 【暴力第 3 步】开启手动模式，不让它乱动
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // 【暴力第 5 步】手动初始化，把配置直接塞给后台
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway',
          repo: 'JoshZ-zzx/ToolBox', // 确保你的仓库名是这个
          branch: 'main',
          site_domain: 'inspiring-cat-299a60.netlify.app'
        },
        display_url: "https://joshzhangzzx.top",
        media_folder: "images",
        public_folder: "/images",
        collections: [
          {
            name: "posts",
            label: "我的博文",
            folder: "_posts",
            create: true,
            fields: [
              { label: "标题", name: "title", widget: "string" },
              { label: "正文", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });

    // 【暴力第 6 步】初始化 Identity 配置（这次换个写法，不调函数，改对象）
    netlifyIdentity.init({
      APIConfig: {
        api_url: 'https://inspiring-cat-299a60.netlify.app/.netlify/identity'
      }
    });
  </script>
</body>
</html>
