<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Josh's Admin</title>
  
  <link rel="mask-icon" href="https://inspiring-cat-299a60.netlify.app/.netlify/identity">
  <link rel="origin" href="https://inspiring-cat-299a60.netlify.app">

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    // 在全局作用域强制注入地址，防止 store.js 去猜
    window.netlifyIdentity = window.netlifyIdentity || {};
    
    // 强制清理之前的错误缓存
    localStorage.removeItem('netlifySiteURL');
    localStorage.setItem('netlifySiteURL', 'https://inspiring-cat-299a60.netlify.app');

    // 监听初始化
    document.addEventListener('DOMContentLoaded', () => {
      window.netlifyIdentity.init({
        APIConfig: {
          api_url: 'https://inspiring-cat-299a60.netlify.app/.netlify/identity'
        }
      });
    });
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
